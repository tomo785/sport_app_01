server:
  port: 8080
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: sport-app-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sport_app?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ZQQlpw1314
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: redis
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # WebSocket配置
  websocket:
    enabled: true

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sport.model.entity

# JWT配置
jwt:
  secret: sport-app-secret-key-2025-for-jwt-token-generation-and-validation
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 任务卡片配置
task:
  # 默认训练提醒时间（秒）
  default-rest-time: 60
  # 每日目标卡路里
  daily-target-calories: 500
  # 每日目标时长（分钟）
  daily-target-duration: 60
  # 自动同步穿戴设备数据间隔（秒）
  wearable-sync-interval: 300

# AI对话配置（预留）
ai:
  enabled: true
  # AI服务提供商配置
  provider: openai  # openai/claude/custom
  api-key: your-api-key
  model: gpt-4
  # 最大上下文长度
  max-context-length: 10
  # 系统提示词
  system-prompt: "你是一位专业的AI健身教练，擅长制定训练计划、解答运动问题、提供实时训练指导。请用友好、专业的语气回答用户的问题。"

# 短信配置（请根据实际情况修改）
sms:
  access-key: your-access-key
  secret-key: your-secret-key
  sign-name: 运动App
  template-code: SMS_TEMPLATE_CODE

# 文件存储配置（MinIO/阿里云OSS）
file:
  storage-type: local  # local/minio/aliyun
  local:
    upload-path: ./uploads/
    access-url: http://localhost:8080/uploads/
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: sport-app
  aliyun:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key: your-access-key
    secret-key: your-secret-key
    bucket-name: sport-app

# 智能穿戴设备配置
wearable:
  # Apple HealthKit配置
  apple-health:
    enabled: true
    bundle-id: com.sport.app
  # Google Fit配置
  google-fit:
    enabled: true
    client-id: your-client-id
    client-secret: your-client-secret
  # 华为Health配置
  huawei-health:
    enabled: true
    app-id: your-app-id

# 日志配置
logging:
  level:
    com.sport: debug
    com.baomidou.mybatisplus: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/sport-app.log
    max-size: 10MB
    max-history: 30

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50

  data:
    redis:
      timeout: 5000

logging:
  level:
    com.sport: info
    com.baomidou.mybatisplus: warn
    org.springframework.web: warn
